# Prior pretraining on latent codes sampled from the stage-1 distortion posterior.
# Typical usage: provide --model.init_args.init_from_ckpt=/path/to/stage1.ckpt

model:
  init_args:
    force_stage: prior_pretrain
    num_mis_steps: 1
    parallel_mis_sampling: true
    num_validation_mis_steps: 15
    init_from_ckpt: ./egs/cifar10/perceptual_jsa/cifar10_stage1_decoder/2026-03-29_12-47-24/checkpoints/step=025872-epoch=000131.ckpt
    pkeep: 0.9
data:
  class_path: src.data.cifar10.CIFAR10DataModule
  init_args:
    root: ./data/cifar10
    batch_size: 64
    num_workers: 4

trainer:
  logger:
    init_args:
      name: cifar10_stage2_prior
  max_steps: 100000
  strategy: ddp_find_unused_parameters_true
